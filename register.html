<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Реєстрація</h2>

    <input id="name" type="text" placeholder="Ваше ім'я">
    <div id="err_name" class="error"></div>

    <input id="email" type="email" placeholder="Email">
    <div id="err_email" class="error"></div>

    <input id="phone" type="tel" placeholder="Телефон">
    <div id="err_phone" class="error"></div>

    <input id="photo" type="file" accept="image/*">
    <img id="preview" class="preview" style="display:none">

    <button onclick="sendData()">Завершити</button>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 📌 Перегляд фото
    document.getElementById("photo").onchange = function () {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = document.getElementById("preview");
                img.src = e.target.result;
                img.style.display = "block";
            }
            reader.readAsDataURL(file);
        }
    };


    function sendData() {

        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let photo = document.getElementById("preview").src;

        // Очищення помилок
        document.getElementById("err_name").innerText = "";
        document.getElementById("err_email").innerText = "";
        document.getElementById("err_phone").innerText = "";

        // 📌 Перевірка
        let valid = true;

        if (!name) {
            document.getElementById("err_name").innerText = "Введіть ім’я";
            valid = false;
        }

        if (!email.match(/^[^@\s]+@[^@\s]+\.[^@\s]+$/)) {
            document.getElementById("err_email").innerText = "Невірний email";
            valid = false;
        }

        if (!phone.match(/^\+?\d{8,15}$/)) {
            document.getElementById("err_phone").innerText = "Невірний номер телефону";
            valid = false;
        }

        if (!valid) return;

        // 📌 Пакуємо дані
        const data = {
            name,
            email,
            phone,
            photo
        };

        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>

</body>
</html>
